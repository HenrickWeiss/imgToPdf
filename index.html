<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilder zu PDF Konverter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .upload-box {
            border: 2px dashed #3498db;
            padding: 20px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            background: #eaf2f8;
            transition: background 0.3s;
        }
        .upload-box:hover {
            background: #d4e6f1;
        }
        input[type="file"] {
            display: none;
        }
        .settings {
            margin: 20px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        select, input[type="text"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #27ae60;
        }
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #preview {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 100px));
            gap: 10px;
        }
        .preview-img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Bilder zu PDF</h1>
    
    <div class="upload-box" onclick="document.getElementById('imageInput').click()">
        <p>Klicke hier, um Bilder auszuwählen (JPG, PNG)</p>
        <input type="file" id="imageInput" accept="image/jpeg, image/png" multiple onchange="handleImages(this.files)">
    </div>

    <div id="preview"></div>

    <div class="settings">
        <div>
            <label for="format">Kompression/Typ:</label>
            <select id="format">
                <option value="JPEG">JPEG (Standard/Kleiner)</option>
                <option value="PNG">PNG (Verlustfrei)</option>
            </select>
        </div>
        <div>
            <label for="filename">Dateiname:</label>
            <input type="text" id="filename" value="mein_dokument" style="width: 120px;"> .pdf
        </div>
    </div>

    <button id="generateBtn" onclick="generatePDF()" disabled>PDF generieren & speichern</button>
</div>

<script>
    // Destrukturierung von jsPDF aus dem globalen Fenster-Objekt
    const { jsPDF } = window.jspdf;
    let imageFiles = [];

    // Verarbeitet die ausgewählten Bilder und zeigt eine kleine Vorschau an
    function handleImages(files) {
        const preview = document.getElementById('preview');
        const generateBtn = document.getElementById('generateBtn');
        
        // Array zurücksetzen, falls neue Bilder gewählt werden
        imageFiles = Array.from(files);
        preview.innerHTML = '';

        if (imageFiles.length > 0) {
            generateBtn.disabled = false;
            
            imageFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.classList.add('preview-img');
                    preview.appendChild(img);
                }
                reader.readAsDataURL(file);
            });
        } else {
            generateBtn.disabled = true;
        }
    }

    // Erstellt das PDF-Dokument
    async function generatePDF() {
        if (imageFiles.length === 0) return;

        const formatSelect = document.getElementById('format').value; // JPEG oder PNG
        const filename = document.getElementById('filename').value || 'dokument';
        
        // Initialisiere jsPDF (A4-Format, Maßeinheit Millimeter)
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < imageFiles.length; i++) {
            if (i > 0) {
                pdf.addPage(); // Neue Seite für jedes weitere Bild hinzufügen
            }

            // Bild laden, um die echten Dimensionen zu ermitteln (wichtig für die Skalierung)
            const imgData = await loadImageAsBase64(imageFiles[i]);
            const imgDimensions = await getImageDimensions(imgData);

            // Verhältnis berechnen, damit das Bild auf die A4-Seite passt, ohne verzerrt zu werden
            let widthRatio = pdfWidth / imgDimensions.width;
            let heightRatio = pdfHeight / imgDimensions.height;
            let ratio = Math.min(widthRatio, heightRatio);

            let imgWidth = imgDimensions.width * ratio;
            let imgHeight = imgDimensions.height * ratio;

            // Bild zentrieren
            let xOffset = (pdfWidth - imgWidth) / 2;
            let yOffset = (pdfHeight - imgHeight) / 2;

            // Bild dem PDF hinzufügen (Daten, Format, X, Y, Breite, Höhe)
            pdf.addImage(imgData, formatSelect, xOffset, yOffset, imgWidth, imgHeight);
        }

        // PDF-Download triggern
        pdf.save(`${filename}.pdf`);
    }

    // Hilfsfunktion: Wandelt eine Datei in einen Base64 DataURL-String um
    function loadImageAsBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => resolve(e.target.result);
            reader.readAsDataURL(file);
        });
    }

    // Hilfsfunktion: Ermittelt die Originalgröße des Bildes in Pixeln
    function getImageDimensions(base64Str) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve({ width: img.width, height: img.height });
            img.src = base64Str;
        });
    }
</script>

</body>
</html>
